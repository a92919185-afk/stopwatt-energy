<section id="trust" aria-label="Trust indicators">
  <div class="container">
    <div class="trust-grid">
      {{#each trust_badges}}
      <div class="trust-badge">
        <div class="trust-icon">
          <i class="{{icon}}" aria-hidden="true"></i>
        </div>
        <div class="trust-badge-text">
          <strong>{{title}}</strong>
          <span>{{subtitle}}</span>
        </div>
      </div>
      {{/each}}
    </div>
  </div>
</section>
