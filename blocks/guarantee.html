<section class="guarantee" aria-label="Money back guarantee">
  <div class="container">
    <div class="guarantee-inner">
      <div class="guarantee-image">
        <img
          src="{{guarantee_image}}"
          alt="{{guarantee_days}}-Day Money Back Guarantee"
          loading="lazy"
        />
      </div>
      <div class="guarantee-text">
        <h2>{{guarantee_headline}}</h2>
        <p>{{guarantee_body}}</p>
        <a href="{{cta_url}}" class="btn-secondary">{{guarantee_cta_text}}</a>
      </div>
    </div>
  </div>
</section>
