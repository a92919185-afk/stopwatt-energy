<section id="science" aria-labelledby="science-h2">
  <div class="container">
    <div class="features-header">
      <div class="section-label">{{science_label}}</div>
      <h2 id="science-h2" class="section-h2">{{science_headline}}</h2>
      <p class="reviews-subheadline" style="margin-top: 12px; font-size: 1rem; color: var(--text-muted);">
        {{science_subheadline}}
      </p>
    </div>
    <div class="benefits-layout">
      <div class="benefits-img">
        <img
          src="{{science_image}}"
          alt="{{product_name}} — scientific mechanism"
          width="600" height="600"
          loading="lazy"
        />
      </div>
      <div class="benefits-text">
        <h3 class="section-h2">{{science_title}}</h3>
        {{#each science_steps}}
        <p class="section-body">
          <strong style="color: var(--primary);">{{step}}</strong><br/>
          {{text}}
        </p>
        {{/each}}
        <p class="section-body" style="margin-top: 20px; padding: 16px; background: var(--primary-light); border-radius: 8px;">
          <strong>{{science_result}}</strong>
        </p>
        <a href="{{cta_url}}" class="btn-primary" style="margin-top: 24px;">
          <i class="fa-solid fa-flask" aria-hidden="true"></i>
          {{science_cta_text}}
        </a>
      </div>
    </div>
  </div>
</section>
