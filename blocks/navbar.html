<header id="header" role="navigation">
  <div class="nav-inner">
    <a href="#hero" class="nav-logo" aria-label="{{product_name}} Home">
      <span class="nav-logo-text">{{product_name}}</span>
    </a>
    <nav class="nav-links" aria-label="Main navigation">
      {{#each nav_links}}
      <a href="{{href}}">{{label}}</a>
      {{/each}}
    </nav>
    <div class="nav-cta">
      <a href="{{cta_url}}" class="btn-primary">
        <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
        {{cta_text}}
      </a>
    </div>
  </div>
</header>
