<section id="hero" aria-labelledby="hero-h1">
  <div class="hero-inner">
    <div class="hero-text">
      <div class="hero-badge">
        <i class="fa-solid fa-award" aria-hidden="true"></i>
        {{hero_badge}}
      </div>
      <h1 id="hero-h1">
        {{headline}}
        <span class="highlight">{{headline_highlight}}</span>
      </h1>
      <p class="hero-subtext">{{hero_subtext_1}}</p>
      <p class="hero-subtext">{{hero_subtext_2}}</p>
      <div class="hero-tagline">
        {{#each hero_tags}}
        <span><i class="{{icon}}" aria-hidden="true"></i> {{text}}</span>
        {{/each}}
      </div>
      <div class="hero-cta-group">
        <a href="{{cta_url}}" class="btn-primary">
          <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
          {{hero_cta_text}}
        </a>
        <p class="hero-guarantee">
          <i class="fa-solid fa-lock" aria-hidden="true"></i>
          {{hero_guarantee_text}}
        </p>
      </div>
    </div>
    <div class="hero-img-col">
      <img
        class="hero-product-img"
        src="{{hero_image}}"
        alt="{{product_name}}"
        width="480" height="480"
        loading="eager"
      />
    </div>
  </div>
</section>
