<section id="features" aria-labelledby="features-h2">
  <div class="container">
    <div class="features-header">
      <div class="section-label">{{features_label}}</div>
      <h2 id="features-h2" class="section-h2">{{features_headline}}</h2>
      <p class="reviews-subheadline" style="margin-top: 12px; font-size: 1rem; color: var(--text-muted);">
        {{features_subheadline}}
      </p>
    </div>
    <div class="features-grid">
      {{#each features}}
      <div class="feature-card">
        <div class="feature-icon-wrap">
          <i class="{{icon}}" aria-hidden="true"></i>
        </div>
        <div class="feature-title">{{title}}</div>
        <p class="feature-desc">{{description}}</p>
      </div>
      {{/each}}
    </div>
    <div class="features-cta">
      <a href="{{cta_url}}" class="btn-primary">
        <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
        {{features_cta_text}}
      </a>
    </div>
  </div>
</section>
