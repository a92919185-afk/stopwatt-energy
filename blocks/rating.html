<section class="rating-block" aria-label="Customer rating">
  <div class="container">
    <h3 class="rating-headline">{{rating_headline}}</h3>
    <div class="rating-display">
      <span class="rating-number">{{rating_value}}/5</span>
      <div class="rating-stars" aria-label="{{rating_value}} out of 5 stars">
        <i class="fa-solid fa-star" aria-hidden="true"></i>
        <i class="fa-solid fa-star" aria-hidden="true"></i>
        <i class="fa-solid fa-star" aria-hidden="true"></i>
        <i class="fa-solid fa-star" aria-hidden="true"></i>
        <i class="fa-solid fa-star-half-stroke" aria-hidden="true"></i>
      </div>
    </div>
    <p class="rating-count">based on <strong>{{rating_count}}</strong></p>
  </div>
</section>
