<section id="reviews" aria-labelledby="reviews-h2">
  <div class="container">
    <div class="reviews-header">
      <div class="section-label">{{reviews_label}}</div>
      <h2 id="reviews-h2" class="section-h2">{{reviews_headline}}</h2>
      <p class="reviews-subheadline">{{reviews_subheadline}}</p>
    </div>
    <div class="reviews-grid">
      {{#each reviews}}
      <div class="review-card">
        <div class="review-image">
          <img src="{{image}}" alt="{{name}}" loading="lazy" />
        </div>
        <div class="review-stars" aria-label="5 out of 5 stars">★★★★★</div>
        <p class="review-body">"{{body}}"</p>
        <div class="reviewer-name">{{name}}</div>
        <div class="reviewer-location">
          <i class="fa-solid fa-check-circle" aria-hidden="true" style="color: #22c55e;"></i>
          {{verified_text}}
        </div>
      </div>
      {{/each}}
    </div>
    <div class="reviews-stats">
      {{#each review_stats}}
      <div class="review-stat">
        <div class="number">{{value}}</div>
        <div class="label">{{label}}</div>
      </div>
      {{/each}}
    </div>
  </div>
</section>
