<section class="how-it-works" id="how-it-works" aria-labelledby="how-it-works-h2">
  <div class="container">
    <h2 id="how-it-works-h2" class="section-h2-review">{{how_it_works_headline}}</h2>
    <p class="how-it-works-intro">{{how_it_works_intro}}</p>
    <div class="how-it-works-image">
      <img
        src="{{how_it_works_image}}"
        alt="How {{product_name}} works"
        loading="lazy"
      />
    </div>
    <div class="how-it-works-steps">
      {{#each how_it_works_steps}}
      <div class="how-it-works-step">
        <h3>{{title}}</h3>
        <p>{{text}}</p>
      </div>
      {{/each}}
    </div>
  </div>
</section>
