<section id="social-proof" aria-label="Customer statistics">
  <div class="container">
    <div class="social-proof-grid">
      {{#each stats}}
      <div class="stat-item">
        <div class="stat-number">{{value}}</div>
        <div class="stat-label">{{label}}</div>
      </div>
      <div class="stat-divider" aria-hidden="true"></div>
      {{/each}}
    </div>
  </div>
</section>
