<section class="ingredients-list" id="ingredients" aria-labelledby="ingredients-h2">
  <div class="container">
    <h2 id="ingredients-h2" class="section-h2-review">{{ingredients_headline}}</h2>
    <p class="ingredients-intro">{{ingredients_intro}}</p>
    <div class="ingredients-image">
      <img
        src="{{ingredients_image}}"
        alt="{{product_name}} Ingredients"
        loading="lazy"
      />
    </div>
    <ol class="ingredients-ol">
      {{#each ingredients}}
      <li class="ingredient-item">
        <span class="ingredient-number" aria-hidden="true">{{number}}</span>
        <p><strong>{{name}}:</strong> {{description}}</p>
      </li>
      {{/each}}
    </ol>
  </div>
</section>
