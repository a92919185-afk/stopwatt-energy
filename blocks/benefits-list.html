<section class="benefits-list" id="benefits" aria-labelledby="benefits-list-h2">
  <div class="container">
    <h2 id="benefits-list-h2" class="section-h2-review">{{benefits_list_headline}}</h2>
    <p class="benefits-list-intro">{{benefits_list_intro}}</p>
    <div class="benefits-list-image">
      <img
        src="{{benefits_list_image}}"
        alt="{{product_name}} Benefits"
        loading="lazy"
      />
    </div>
    <ul class="benefits-checklist">
      {{#each benefits_items}}
      <li class="benefits-checklist-item">
        <i class="fa-solid fa-circle-check" aria-hidden="true"></i>
        <span>{{this}}</span>
      </li>
      {{/each}}
    </ul>
  </div>
</section>
