<section class="product-identity" id="what-is" aria-labelledby="product-identity-h2">
  <div class="container">
    <h2 id="product-identity-h2" class="section-h2-review">{{product_identity_headline}}</h2>
    <div class="product-identity-image">
      <img
        src="{{product_identity_image}}"
        alt="{{product_name}}"
        loading="lazy"
      />
    </div>
    <div class="product-identity-body">
      {{#each product_identity_paragraphs}}
      <p>{{this}}</p>
      {{/each}}
    </div>
  </div>
</section>
