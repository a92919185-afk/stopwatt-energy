<section class="trust-c" aria-labelledby="trust-c-h2">
  <div class="container">
    <h2 id="trust-c-h2" class="section-h2-review">{{trust_c_headline}}</h2>
    <div class="trust-c-grid">
      {{#each trust_c_badges}}
      <div class="trust-c-card">
        <img src="{{image}}" alt="{{title}}" class="trust-c-icon" loading="lazy" />
        <h3>{{title}}</h3>
        <p>{{subtitle}}</p>
      </div>
      {{/each}}
    </div>
  </div>
</section>
