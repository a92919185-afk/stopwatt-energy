<section id="hero" class="hero-c" aria-labelledby="hero-c-h1">
  <div class="container">
    <div class="hero-c-inner">

      <div class="hero-c-image">
        <img
          src="{{hero_image}}"
          alt="{{product_name}}"
          width="480" height="480"
          loading="eager"
        />
      </div>

      <div class="hero-c-text">
        <h1 id="hero-c-h1">{{headline}} <span class="highlight">{{headline_highlight}}</span></h1>

        <div class="hero-c-body">
          {{#each hero_paragraphs}}
          <p>{{this}}</p>
          {{/each}}
        </div>

        <div class="hero-c-pricing">
          <p class="hero-c-offer-label">{{hero_offer_text}}</p>
          <div class="hero-c-price-row">
            <span class="hero-c-price">{{price_display}}</span>
            <span class="hero-c-price-original">{{price_original}}</span>
          </div>
        </div>

        <div class="hero-c-cta-group">
          <a href="{{cta_url}}" class="btn-primary">
            <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
            {{hero_cta_text}}
          </a>
          <p class="hero-guarantee">
            <i class="fa-solid fa-lock" aria-hidden="true"></i>
            {{hero_guarantee_text}}
          </p>
        </div>

      </div>
    </div>
  </div>
</section>
